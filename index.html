<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Review App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🍕 Food Review System</h1>
        
        <!-- Add Food Form -->
        <section class="form-section">
            <h2>Add New Review</h2>
            <form id="addForm">
                <select id="foodType" required>
                    <option value="">Select Food Type</option>
                    <option value="pizza">Pizza</option>
                    <option value="burger">Burger</option>
                    <option value="sushi">Sushi</option>
                </select>
                <input type="text" id="foodName" placeholder="Food Name" required>
                <input type="number" id="rating" min="1" max="5" placeholder="Rating (1-5)" required>
                <textarea id="review" placeholder="Your review..." required></textarea>
                <button type="submit">Add Review</button>
            </form>
        </section>

        <!-- Stats -->
        <section class="stats-section">
            <h2>📊 Statistics</h2>
            <div id="stats">No reviews yet</div>
        </section>

        <!-- Reviews List -->
        <section class="reviews-section">
            <h2>📝 All Reviews</h2>
            <div id="reviewsList">No reviews added yet.</div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
